# oats-config.yaml is the entry point of an OATS project. `oats` finds it in the
# current directory or any parent.
#
# A suite groups cases that share one fixture and is the unit of parallelism +
# filtering. The fixture lives on the cases (there is no suite- or config-level
# fixture): every case here declares the same remote grafana/otel-lgtm, so they
# agree and form one suite. A remote fixture boots nothing — OATS just points at
# an already-running stack — so "sharing" it costs nothing; the suite mainly buys
# grouping + tags here. (When a fixture is expensive to boot, like compose/k3d,
# the shared boot is the real win — see examples/fixtures.)
meta:
  version: 3                        # OATS schema version (the single version; cases carry none)

suites:
  - name: smoke
    cases: ["*/oats-case.yaml"]     # one case per subdirectory (glob, relative to this file)
    tags: [traces, logs, metrics]   # optional labels; filter with `oats --tags traces`
