# Profiles are queried from Pyroscope. They can't be inline-seeded, so assert
# them against an app-backed fixture that produces CPU profiles.
name: profile smoke
tags: [profiles]

fixture:
  remote:
    endpoint: http://localhost:4318   # already-running grafana/otel-lgtm (not booted by OATS)

expected:
  profiles:
    - query: 'process_cpu:cpu:nanoseconds:cpu:nanoseconds{}'   # Pyroscope query
      match:
        - match_type: regexp
          name: 'main|worker'                                  # a matching flamegraph frame
