networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.57.0/24
services:
  grafana:
    image: grafana/grafana:13.1.0@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    network_mode: host
    volumes:
      - ./configs/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/grafana-datasources.yaml
  mongodb:
    image: mongo:7-jammy@sha256:4b28ec57099ae8c1059b22b5e14e664f5b12ebb50b978a69339a824fab4963be
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: 5m
    ports:
      - 27017:27017
    volumes:
      - dbdata6:/data/db
version: "3.9"
volumes:
  dbdata6: null
x-default-logging:
  driver: json-file
  options:
    max-file: "2"
    max-size: 5m
