name: value
tags: [assert, value, metrics]

run:
  args:
    # OTLP metric → Prometheus landing latency is 15-35s in otel-lgtm, so allow
    # a generous ceiling; wait.Until returns as soon as the value appears.
    - --timeout
    - 60s
    - --interval
    - 2s

expect:
  stdout_contains:
    - PASS 1/1
