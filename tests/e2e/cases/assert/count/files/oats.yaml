oats-schema-version: 3
name: count
fixture:
  type: remote
  endpoint: {{REMOTE_OTLP_HTTP}}
seed:
  type: inline-otlp
  logs:
    - service: {{CASE_NAME}}
      body: seed-log-line
expected:
  logs:
    - logql: '{service_name="{{CASE_NAME}}"}'
      count: '== 1'
      match:
        - name: seed-log-line
