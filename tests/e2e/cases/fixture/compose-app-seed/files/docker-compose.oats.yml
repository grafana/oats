services:
  # A real instrumented app: telemetrygen exports OTLP traces to the LGTM
  # collector (added by `template: lgtm`). restart: always re-emits until LGTM
  # is ready, so the trace reliably lands regardless of startup ordering.
  telemetrygen:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    command:
      - traces
      - --otlp-endpoint
      - lgtm:4317
      - --otlp-insecure
      - --service
      - oats-app-e2e
      - --traces
      - "5"
    restart: always
    depends_on:
      - lgtm
