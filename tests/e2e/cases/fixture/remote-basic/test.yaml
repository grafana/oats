name: remote-basic
tags: [fixture, remote]
execution:
  mode: serial
run:
  shell: |
    set -euo pipefail
    workdir="$PWD"
    project="oats-remote-basic-$$"
    trap 'docker compose -p "$project" -f "$workdir/files/docker-compose.remote.yml" down -v --remove-orphans >/dev/null 2>&1 || true' EXIT
    docker compose -p "$project" -f "$workdir/files/docker-compose.remote.yml" up -d >/dev/null
    for i in $(seq 1 60); do
      if curl -fsS http://localhost:3001/api/health >/dev/null; then
        break
      fi
      sleep 2
    done
    cat > "$workdir/files/gcx.remote.yaml" <<CFG
    current-context: remote
    contexts:
      remote:
        grafana:
          server: http://localhost:3001
          user: admin
          password: admin
          org-id: 1
          auth-method: basic
        datasources:
          prometheus: prometheus
          loki: loki
          tempo: tempo
          pyroscope: pyroscope
    CFG
    GCX_CONFIG="$workdir/files/gcx.remote.yaml" "{{OATS}}" --config "$workdir/.generated-oats.toml" --gcx "{{GCX}}" --gcx-context remote --no-cache
expect:
  stdout_contains:
    - PASS 1/1
