name: remote-basic
tags: [fixture, remote]
execution:
  mode: serial
run:
  shell: |
    set -euo pipefail
    workdir="$PWD"
    project="oats-remote-basic-$$"
    trap 'docker compose -p "$project" -f "$workdir/files/docker-compose.remote.yml" down -v --remove-orphans >/dev/null 2>&1 || true' EXIT
    docker compose -p "$project" -f "$workdir/files/docker-compose.remote.yml" up -d >/dev/null
    grafana_port="$(docker compose -p "$project" -f "$workdir/files/docker-compose.remote.yml" port lgtm 3000 | awk -F: '{print $NF}')"
    otlp_port="$(docker compose -p "$project" -f "$workdir/files/docker-compose.remote.yml" port lgtm 4318 | awk -F: '{print $NF}')"
    for i in $(seq 1 60); do
      if curl -fsS "http://127.0.0.1:${grafana_port}/api/health" >/dev/null; then
        break
      fi
      sleep 2
    done
    cat > "$workdir/files/gcx.remote.yaml" <<CFG
    current-context: remote
    contexts:
      remote:
        grafana:
          server: http://127.0.0.1:${grafana_port}
          user: admin
          password: admin
          org-id: 1
          auth-method: basic
        datasources:
          prometheus: prometheus
          loki: loki
          tempo: tempo
          pyroscope: pyroscope
    CFG
    cat > "$workdir/files/oats.yaml" <<CFG
    oats-schema-version: 3
    name: remote-basic
    fixture:
      type: remote
      endpoint: http://127.0.0.1:${otlp_port}
    seed:
      type: inline-otlp
      logs:
        - service: remote-basic
          body: seed-log-line
    expected:
      logs:
        - logql: '{service_name="remote-basic"}'
          match:
            - name: seed-log-line
              attributes:
                - key: service_name
                  value: remote-basic
    CFG
    GCX_CONFIG="$workdir/files/gcx.remote.yaml" "{{OATS}}" --config "$workdir/.generated-oats.toml" --gcx "{{GCX}}" --gcx-context remote --no-cache
expect:
  stdout_contains:
    - PASS 1/1
