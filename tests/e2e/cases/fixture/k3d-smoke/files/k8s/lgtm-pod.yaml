apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lgtm
  template:
    metadata:
      labels:
        app: lgtm
    spec:
      containers:
        - name: lgtm
          image: docker.io/library/alpine:3.22
          command: ["sh", "-c", "sleep infinity"]
---
apiVersion: v1
kind: Service
metadata:
  name: lgtm
spec:
  selector:
    app: lgtm
  ports:
    - name: loki
      port: 3100
      targetPort: 3100
    - name: prom
      port: 9090
      targetPort: 9090
    - name: tempo
      port: 3200
      targetPort: 3200
    - name: pyro
      port: 4040
      targetPort: 4040
