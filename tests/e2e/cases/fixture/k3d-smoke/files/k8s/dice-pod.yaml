apiVersion: v1
kind: Pod
metadata:
  name: dice
  labels:
    app: dice
spec:
  containers:
    - name: dice
      image: dice:test
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c", "sleep infinity"]
---
apiVersion: v1
kind: Service
metadata:
  name: dice
spec:
  selector:
    app: dice
  ports:
    - name: http
      port: 8080
      targetPort: 8080
