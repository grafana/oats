[tools]

# Runtime used by the black-box examples.
"aqua:grafana/gcx" = "0.4.4"
go = "1.26.5"
goreleaser = "2.17.0"
k3d = "5.9.0"
kubectl = "1.36.2"
node = "24.18.0"

# Linters
actionlint = "1.7.12"
"aqua:grafana/flint" = "0.22.9"
"aqua:owenlamont/ryl" = "0.21.0"
biome = "2.5.4"
editorconfig-checker = "3.8.0"
golangci-lint = "2.12.2"
hadolint = "2.14.0"
lychee = "0.24.2"
"npm:renovate" = "43.265.5"
rumdl = "0.2.34"
shellcheck = "0.11.0"
shfmt = "3.13.1"
taplo = "0.10.0"
typos = "1.48.0"

[env]
FLINT_CONFIG_DIR = ".github/config"

[tasks.lint]
description = "Run all lints"
run = "flint run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "flint run --fix"

[tasks.test]
description = "Run tests"
run = 'GOFLAGS=-buildvcs=false go test -coverprofile=coverage.out $(GOFLAGS=-buildvcs=false go list ./... | grep -v "github.com/grafana/oats/tests/e2e")'

[tasks.e2e-test]
description = "Run e2e cases"
run = "go test -v -buildvcs=false ./tests/e2e -run TestCases"

[tasks.example-test]
description = "Run the self-contained examples"
run = "bash ./.mise/tasks/example-test.sh"

[tasks.build]
description = "Build the project"
run = "bash ./scripts/build-oats.sh"

[tasks.check]
description = "Run all checks"
depends = ["lint", "test"]
