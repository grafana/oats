[tools]
go = "1.26.4"
goreleaser = "2.16.0"
node = "24.18.0"

# Linters
actionlint = "1.7.12"
"aqua:grafana/flint" = "0.22.6"
"aqua:owenlamont/ryl" = "0.21.0"
biome = "2.5.1"
editorconfig-checker = "3.7.0"
golangci-lint = "2.12.2"
hadolint = "2.14.0"
lychee = "0.24.2"
"npm:renovate" = "43.243.2"
rumdl = "0.2.23"
shellcheck = "0.11.0"
shfmt = "3.13.1"
taplo = "0.10.0"
typos = "1.47.2"

[env]
FLINT_CONFIG_DIR = ".github/config"

[tasks.lint]
description = "Run all lints"
run = "flint run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "flint run --fix"

[tasks.test]
description = "Run tests"
run = "go test $(go list ./...)"

[tasks.integration-test]
description = "Run integration tests"
env.INTEGRATION_TESTS = "true"
run = "go test github.com/grafana/oats/tests"

[tasks.build]
description = "Build the project"
run = "go build"

[tasks.check]
description = "Run all checks"
depends = ["lint", "test"]

[tasks.deps]
description = "Update dependencies"
run = "go mod tidy"
