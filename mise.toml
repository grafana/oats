[tools]
go = "1.26.4"
goreleaser = "2.17.0"
k3d = "5.8.3"
kubectl = "1.34.1"
node = "24.18.0"

# Linters
actionlint = "1.7.12"
"aqua:grafana/flint" = "0.22.6"
"aqua:owenlamont/ryl" = "0.21.0"
biome = "2.5.2"
editorconfig-checker = "3.8.0"
golangci-lint = "2.12.2"
hadolint = "2.14.0"
lychee = "0.24.2"
"npm:renovate" = "43.251.0"
rumdl = "0.2.27"
shellcheck = "0.11.0"
shfmt = "3.13.1"
taplo = "0.10.0"
typos = "1.48.0"

[env]
FLINT_CONFIG_DIR = ".github/config"

[tasks.lint]
description = "Run all lints"
run = "flint run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "flint run --fix"

[tasks.test]
description = "Run tests"
run = 'GOFLAGS=-buildvcs=false go test $(GOFLAGS=-buildvcs=false go list ./... | grep -v "github.com/grafana/oats/tests/e2e")'

[tasks.e2e-test]
description = "Run e2e case suite"
run = "go test -v -buildvcs=false ./tests/e2e -run TestCases"

[tasks.example-test]
description = "Black-box test: build oats+gcx, then run the python example (needs Docker)"
run = '''
root="$PWD"
# Reuse a prebuilt bin dir when given one (CI shares the e2e-tools artifact),
# otherwise build the binaries locally — same pattern as e2e-test.
bin_dir="${OATS_EXAMPLE_BIN_DIR:-$root/bin}"
if [ ! -x "$bin_dir/oats" ] || [ ! -x "$bin_dir/gcx" ]; then
  ./scripts/build-local-tools.sh "$bin_dir"
fi
cd examples/python
"$bin_dir/oats" --gcx "$bin_dir/gcx" --no-cache --timeout 90s --interval 2s -v
'''

[tasks.build]
description = "Build the project"
run = "go build -buildvcs=false ."

[tasks.check]
description = "Run all checks"
depends = ["lint", "test"]
