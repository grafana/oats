[tools]
go = "1.26.2"

# Tools
actionlint = "1.7.10"
editorconfig-checker = "v3.6.0"
"github:grafana/flint" = "0.20.3"
golangci-lint = "2.11.4"
hadolint = "v2.14.0"
lychee = "0.22.0"
node = "24.15.0"
"npm:@biomejs/biome" = "2.4.12"
"npm:markdownlint-cli2" = "0.17.2"
"npm:prettier" = "3.8.1"
"npm:renovate" = "43.127.1"
"pipx:codespell" = "2.4.1"
shellcheck = "v0.11.0"
shfmt = "v3.12.0"

[env]
FLINT_CONFIG_DIR = ".github/config"

[tasks.lint]
description = "Run all lints"
depends = ["lint:go"]
run = "flint run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = """
flint run --fix
mise run lint:go
"""

[tasks."lint:go"]
description = "Lint Go code"
run = "golangci-lint run"

[tasks.test]
description = "Run tests"
run = "go test $(go list ./...)"

[tasks.integration-test]
description = "Run integration tests"
env.INTEGRATION_TESTS = "true"
run = "go test github.com/grafana/oats/tests"

[tasks.build]
description = "Build the project"
run = "go build"

[tasks.check]
description = "Run all checks"
depends = ["lint", "test"]

[tasks.deps]
description = "Update dependencies"
run = "go mod tidy"
