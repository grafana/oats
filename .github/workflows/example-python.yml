name: Example (python)

# Black-box test of the flagship python example: build oats + gcx, then run oats
# against examples/python (which boots its own grafana/otel-lgtm via the default
# compose template) and assert it passes — the same way a consumer would use it.
on:
  pull_request:
    paths:
      # Black-box test of the whole oats binary — any Go change can affect it,
      # so match all Go source rather than naming packages (easy to forget one).
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "examples/python/**"
      - "scripts/build-local-tools.sh"
      - ".github/workflows/example-python.yml"
      - "mise.toml"
  workflow_dispatch:

permissions: {}

jobs:
  example-python:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: v2026.7.0
          sha256: 0744cb3c303baf0d308ff7b112ed41f22abb6029cb5644fd3a8ce74b29f16a68
      - name: Build oats + gcx and run the python example
        run: mise run example-test
