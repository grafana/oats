name: E2E tests

on: [pull_request]

permissions: {}

jobs:
  build-e2e-tools:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: v2026.7.0
          sha256: 0744cb3c303baf0d308ff7b112ed41f22abb6029cb5644fd3a8ce74b29f16a68
      - name: Build e2e tools
        run: bash ./scripts/build-local-tools.sh "$PWD/.e2e-tools/bin"
      - name: Upload e2e tools
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.6.2
        with:
          name: e2e-tools
          path: .e2e-tools/bin
          if-no-files-found: error

  test-e2e:
    needs: build-e2e-tools
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shard: [core, compose, remote, k3d-fail, k3d-smoke]
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: v2026.7.0
          sha256: 0744cb3c303baf0d308ff7b112ed41f22abb6029cb5644fd3a8ce74b29f16a68
      - name: Download e2e tools
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: e2e-tools
          path: .e2e-tools/bin
      - name: Restore e2e tool permissions
        run: chmod +x .e2e-tools/bin/oats .e2e-tools/bin/gcx
      - name: Run ${{ matrix.shard }} e2e tests
        # OATS_E2E_FILTER is not part of the matrix to avoid that it shows up in the gh action (too long)
        run: |
          start_ts="$(date +%s)"
          case "${{ matrix.shard }}" in
            core)
              export OATS_E2E_FILTER="-fixture/"
              ;;
            compose)
              export OATS_E2E_FILTER="fixture/compose"
              ;;
            remote)
              export OATS_E2E_FILTER="fixture/remote"
              ;;
            k3d-fail)
              export OATS_E2E_FILTER="fixture/k3d-fail"
              ;;
            k3d-smoke)
              export OATS_E2E_FILTER="fixture/k3d-smoke"
              ;;
            *)
              echo "unknown e2e shard: ${{ matrix.shard }}" >&2
              exit 1
              ;;
          esac
          export OATS_E2E_BIN_DIR="$PWD/.e2e-tools/bin"
          echo "e2e timing: shard=${{ matrix.shard }} filter=${OATS_E2E_FILTER} bin_dir=${OATS_E2E_BIN_DIR}"
          mise run e2e-test
          end_ts="$(date +%s)"
          echo "e2e timing: shard=${{ matrix.shard }} total=$((end_ts-start_ts))s"

  # Black-box test of every self-contained example, using the already-built oats
  # and gcx from build-e2e-tools. The smoke examples are discovery-only because
  # their remote app/profile prerequisites are intentionally supplied by users.
  examples:
    needs: build-e2e-tools
    runs-on: ubuntu-24.04
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: v2026.7.0
          sha256: 0744cb3c303baf0d308ff7b112ed41f22abb6029cb5644fd3a8ce74b29f16a68
      - name: Download e2e tools
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: e2e-tools
          path: .e2e-tools/bin
      - name: Restore e2e tool permissions
        run: chmod +x .e2e-tools/bin/oats .e2e-tools/bin/gcx
      - name: Run examples
        run: OATS_BIN="$PWD/.e2e-tools/bin/oats" GCX_BIN="$PWD/.e2e-tools/bin/gcx" mise run example-test

  # Single required check. Branch protection can require just `e2e` instead of
  # every matrix leg, so adding/renaming shards never silently drops coverage.
  # `needs` on the matrix job succeeds only if all its legs did; if: always()
  # makes this run (and go red) even when a dependency fails or is skipped.
  e2e:
    needs: [test-e2e, examples]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Check e2e results
        run: |
          echo "test-e2e=${{ needs.test-e2e.result }} examples=${{ needs.examples.result }}"
          [ "${{ needs.test-e2e.result }}" = "success" ] && [ "${{ needs.examples.result }}" = "success" ]
