networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.57.0/24
services:
  grafana:
    image: grafana/grafana:13.0.2@sha256:5dad0df181cb644a14e13617b913b261a54f7d4fd4510721dba420929f35bea2
    network_mode: host
    volumes:
      - ./configs/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/grafana-datasources.yaml
  mongodb:
    image: mongo:7-jammy@sha256:3dfcd54118850ef1dc583ce991fecca8bba8a9eeccb1ea62a662e2a9c24f5b81
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: 5m
    ports:
      - 27017:27017
    volumes:
      - dbdata6:/data/db
version: "3.9"
volumes:
  dbdata6: null
x-default-logging:
  driver: json-file
  options:
    max-file: "2"
    max-size: 5m
