version: 2

project_name: oats

builds:
  - binary: oats
    main: .
    env:
      # Keep Linux archives libc-independent so they run on glibc and musl.
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/grafana/oats/internal/cli.Version={{ .Version }} -X github.com/grafana/oats/internal/cli.MinimumGCXVersion={{ .Env.GCX_VERSION }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  draft: true
  use_existing_draft: true
  mode: keep-existing
  replace_existing_artifacts: true

changelog:
  disable: true
